spring.application.name=payment-service
server.port=8084

spring.data.mongodb.uri=mongodb://localhost:27017/paymentdb

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.cyboul.eda.common.events
spring.kafka.consumer.properties.spring.json.value.default.type=com.cyboul.eda.common.events.OrderCreatedEvent
# Logging
logging.pattern.console=%d{HH:mm:ss} %-5level [%-40.40logger{36}] %msg%n
logging.level.root=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.mongodb.driver=WARN
