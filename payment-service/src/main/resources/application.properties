spring.application.name=payment-service
server.port=8084

# localhost or docker
spring.kafka.bootstrap-servers=localhost:9092
#spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.cyboul.cloudplatform.common.events
spring.kafka.consumer.properties.spring.json.value.default.type=com.cyboul.cloudplatform.common.events.OrderCreatedEvent
